<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Janela silenciosa</title>
  <desc id="desc">Ilustração minimalista de uma janela aberta para uma noite clara, com uma pequena luz interior, sugerindo solidão, silêncio e presença.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f3eee3"/>
      <stop offset="0.52" stop-color="#e7dfcf"/>
      <stop offset="1" stop-color="#c9c3b4"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="64%">
      <stop offset="0" stop-color="#fff8e8" stop-opacity="0.82"/>
      <stop offset="0.58" stop-color="#eadcc5" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#887f72" stop-opacity="0.12"/>
    </radialGradient>
    <linearGradient id="night" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#7d8790"/>
      <stop offset="1" stop-color="#4f565d"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <pattern id="grain" width="130" height="130" patternUnits="userSpaceOnUse">
      <circle cx="22" cy="31" r="1" fill="#625c52" opacity="0.055"/>
      <circle cx="86" cy="74" r="1.1" fill="#ffffff" opacity="0.11"/>
      <circle cx="112" cy="23" r="0.8" fill="#635d52" opacity="0.045"/>
      <path d="M14 112 C48 97 80 104 119 86" fill="none" stroke="#6c655a" stroke-width="0.7" opacity="0.045"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" rx="38" fill="url(#bg)"/>
  <rect width="1200" height="675" rx="38" fill="url(#glow)"/>
  <rect width="1200" height="675" rx="38" fill="url(#grain)" opacity="0.58"/>

  <path d="M0 510 C190 487 332 500 520 476 C754 447 974 462 1200 432 L1200 675 L0 675 Z" fill="#766e62" opacity="0.10"/>
  <path d="M152 142 C298 111 427 116 548 144" fill="none" stroke="#756d61" stroke-width="2" opacity="0.06"/>
  <path d="M668 144 C812 104 960 111 1068 151" fill="none" stroke="#756d61" stroke-width="2" opacity="0.055"/>

  <g transform="translate(427 132)">
    <rect x="0" y="0" width="346" height="356" rx="12" fill="#b9ae9d" opacity="0.30"/>
    <rect x="26" y="25" width="294" height="306" rx="8" fill="url(#night)" opacity="0.78"/>
    <line x1="173" y1="25" x2="173" y2="331" stroke="#e6ddcd" stroke-width="8" opacity="0.55"/>
    <line x1="26" y1="178" x2="320" y2="178" stroke="#e6ddcd" stroke-width="8" opacity="0.55"/>
    <rect x="26" y="25" width="294" height="306" rx="8" fill="none" stroke="#efe6d6" stroke-width="8" opacity="0.62"/>
    <circle cx="94" cy="91" r="2.8" fill="#f4ecdc" opacity="0.68"/>
    <circle cx="250" cy="73" r="2.2" fill="#f4ecdc" opacity="0.58"/>
    <circle cx="224" cy="247" r="2.4" fill="#f4ecdc" opacity="0.52"/>
    <circle cx="118" cy="231" r="2" fill="#f4ecdc" opacity="0.48"/>
    <path d="M79 306 C121 272 151 253 187 220 C225 185 251 155 285 101" fill="none" stroke="#f4ecdc" stroke-width="1.5" opacity="0.12"/>
  </g>

  <g opacity="0.26" filter="url(#soft)">
    <ellipse cx="604" cy="555" rx="240" ry="36" fill="#4d463f"/>
    <circle cx="601" cy="514" r="72" fill="#f3dca6"/>
  </g>
  <g transform="translate(600 494)">
    <path d="M-28 61 C-23 28 23 28 28 61 C33 92 14 118 0 133 C-14 118 -33 92 -28 61 Z" fill="#82796c" opacity="0.78"/>
    <circle cx="0" cy="28" r="25" fill="#82796c" opacity="0.78"/>
    <path d="M-44 119 C-96 128 -134 150 -166 178" fill="none" stroke="#82796c" stroke-width="18" stroke-linecap="round" opacity="0.45"/>
    <path d="M44 119 C96 128 134 150 166 178" fill="none" stroke="#82796c" stroke-width="18" stroke-linecap="round" opacity="0.45"/>
  </g>

  <path d="M378 611 C486 594 718 594 826 611" fill="none" stroke="#766f64" stroke-width="2" opacity="0.12"/>
  <text x="82" y="568" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#504a42" opacity="0.30">o silêncio também pode ser uma forma de companhia</text>
</svg>

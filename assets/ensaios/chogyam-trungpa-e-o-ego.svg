  <path d="M360 610 C466 593 776 593 884 610" fill="none" stroke="#756b60" stroke-width="2" opacity="0.12"/>
  <text x="80" y="562" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#4f4840" opacity="0.30">até a busca pode virar espelho</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Espelho e vela</title>
  <desc id="desc">Ilustração minimalista de um espelho discreto sobre uma mesa com uma pequena vela ao lado, sugerindo ego, espiritualidade e autoimagem.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f4eee4"/>
      <stop offset="0.52" stop-color="#e5dccb"/>
      <stop offset="1" stop-color="#c1b8a8"/>
    </linearGradient>
    <radialGradient id="glow" cx="62%" cy="48%" r="55%">
      <stop offset="0" stop-color="#fff1c9" stop-opacity="0.62"/>
      <stop offset="0.48" stop-color="#e8d8b8" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#6f665d" stop-opacity="0.05"/>
    </radialGradient>
    <linearGradient id="mirror" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#dfe3dc" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#8d9990" stop-opacity="0.45"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <pattern id="grain" width="130" height="130" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="32" r="1" fill="#5f594f" opacity="0.055"/>
      <circle cx="88" cy="76" r="1.1" fill="#ffffff" opacity="0.10"/>
      <circle cx="112" cy="21" r="0.8" fill="#635b51" opacity="0.045"/>
      <path d="M10 112 C43 96 79 104 119 84" fill="none" stroke="#6c6459" stroke-width="0.7" opacity="0.045"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" rx="38" fill="url(#bg)"/>
  <rect width="1200" height="675" rx="38" fill="url(#glow)"/>
  <rect width="1200" height="675" rx="38" fill="url(#grain)" opacity="0.55"/>

  <path d="M0 510 C170 482 340 498 522 471 C744 438 970 460 1200 422 L1200 675 L0 675 Z" fill="#70675d" opacity="0.12"/>
  <path d="M142 158 C295 125 451 134 587 169" fill="none" stroke="#746a5e" stroke-width="2" opacity="0.06"/>
  <path d="M664 161 C824 119 982 132 1086 174" fill="none" stroke="#746a5e" stroke-width="2" opacity="0.05"/>

  <g opacity="0.24" filter="url(#soft)">

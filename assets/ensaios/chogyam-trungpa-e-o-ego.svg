    <ellipse cx="744" cy="557" rx="76" ry="18" fill="#3d3833"/>
  </g>

  <g transform="translate(522 166)">
    <rect x="-128" y="0" width="256" height="350" rx="128" fill="#7b7165" opacity="0.72"/>
    <rect x="-104" y="26" width="208" height="298" rx="104" fill="url(#mirror)" opacity="0.76"/>
    <path d="M-58 84 C-15 52 41 55 72 93" fill="none" stroke="#fff8e8" stroke-width="5" opacity="0.23"/>
    <path d="M-62 198 C-14 166 44 169 78 207" fill="none" stroke="#4d5a55" stroke-width="3" opacity="0.12"/>
    <rect x="-18" y="347" width="36" height="90" rx="14" fill="#7b7165" opacity="0.76"/>
    <rect x="-95" y="426" width="190" height="26" rx="13" fill="#7b7165" opacity="0.76"/>
  </g>

  <g transform="translate(746 394)">
    <rect x="-34" y="68" width="68" height="78" rx="10" fill="#8a7d6f" opacity="0.78"/>
    <path d="M-21 68 C-17 42 17 42 21 68 Z" fill="#bca681" opacity="0.70"/>
    <path d="M0 31 C18 55 8 70 0 77 C-8 68 -18 55 0 31 Z" fill="#f0ca7f" opacity="0.78"/>
    <path d="M0 44 C8 56 4 64 0 68 C-4 64 -8 56 0 44 Z" fill="#fff2cc" opacity="0.70"/>

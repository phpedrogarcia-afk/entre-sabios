<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Céu refletido em água calma</title>
  <desc id="desc">Ilustração minimalista de céu aberto refletido em água calma, sugerindo mente, repouso e identidade além da memória.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f4efe4"/>
      <stop offset="0.48" stop-color="#e3ddce"/>
      <stop offset="1" stop-color="#bcc4bd"/>
    </linearGradient>
    <radialGradient id="light" cx="50%" cy="30%" r="62%">
      <stop offset="0" stop-color="#fffaf0" stop-opacity="0.86"/>
      <stop offset="0.54" stop-color="#e4e0d0" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#7f8d88" stop-opacity="0.10"/>
    </radialGradient>
    <linearGradient id="water" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#a6b5ad" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#6e827d" stop-opacity="0.24"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <pattern id="grain" width="132" height="132" patternUnits="userSpaceOnUse">
      <circle cx="24" cy="35" r="1" fill="#59615c" opacity="0.05"/>
      <circle cx="88" cy="80" r="1.1" fill="#ffffff" opacity="0.11"/>
      <circle cx="115" cy="24" r="0.8" fill="#5d635d" opacity="0.045"/>
      <path d="M12 114 C43 98 81 106 121 84" fill="none" stroke="#697068" stroke-width="0.7" opacity="0.045"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" rx="38" fill="url(#bg)"/>
  <rect width="1200" height="675" rx="38" fill="url(#light)"/>
  <rect width="1200" height="675" rx="38" fill="url(#grain)" opacity="0.54"/>

  <path d="M0 382 C167 350 317 370 502 342 C729 307 948 337 1200 300 L1200 675 L0 675 Z" fill="url(#water)"/>
  <path d="M132 158 C284 122 446 134 590 166" fill="none" stroke="#66716b" stroke-width="2" opacity="0.055"/>
  <path d="M660 170 C822 124 980 137 1087 176" fill="none" stroke="#66716b" stroke-width="2" opacity="0.05"/>

  <circle cx="600" cy="261" r="132" fill="none" stroke="#77847d" stroke-width="2" opacity="0.13"/>
  <circle cx="600" cy="261" r="215" fill="none" stroke="#77847d" stroke-width="1.5" opacity="0.08"/>
  <circle cx="600" cy="261" r="292" fill="none" stroke="#77847d" stroke-width="1.2" opacity="0.055"/>

  <g opacity="0.22" filter="url(#soft)">
    <ellipse cx="600" cy="458" rx="210" ry="28" fill="#46504c"/>
  </g>

  <path d="M252 445 C388 415 496 438 612 414 C742 387 872 403 1016 374" fill="none" stroke="#6e8079" stroke-width="3" opacity="0.12"/>
  <path d="M180 512 C332 482 487 505 622 477 C766 448 902 467 1062 431" fill="none" stroke="#6e8079" stroke-width="2" opacity="0.10"/>
  <path d="M250 584 C401 560 544 576 692 548 C820 524 974 538 1097 507" fill="none" stroke="#6e8079" stroke-width="2" opacity="0.08"/>

  <g transform="translate(600 378)" opacity="0.54">
    <path d="M-54 25 C-28 -8 28 -8 54 25 C25 57 -25 57 -54 25 Z" fill="#8a9687"/>
    <path d="M-41 24 C-12 18 12 18 41 24" fill="none" stroke="#eff1dc" stroke-width="2" opacity="0.32"/>
  </g>
  <g transform="translate(600 478) scale(1 -0.65)" opacity="0.20">
    <path d="M-54 25 C-28 -8 28 -8 54 25 C25 57 -25 57 -54 25 Z" fill="#52605b"/>
  </g>

  <path d="M396 614 C489 599 711 599 804 614" fill="none" stroke="#6f766e" stroke-width="2" opacity="0.12"/>
  <text x="82" y="562" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#4b514b" opacity="0.30">antes da lembrança, a mente ainda respira</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Silêncio e identidade</title>
  <desc id="desc">Ilustração minimalista de uma figura sentada diante de um espaço amplo e claro, sugerindo presença, consciência e investigação da identidade.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f4efe4"/>
      <stop offset="0.48" stop-color="#e8e1d1"/>
      <stop offset="1" stop-color="#cfc8b8"/>
    </linearGradient>
    <radialGradient id="centerLight" cx="50%" cy="41%" r="62%">
      <stop offset="0" stop-color="#fffdf5" stop-opacity="0.92"/>
      <stop offset="0.56" stop-color="#efe7d7" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#a99f8e" stop-opacity="0.16"/>
    </radialGradient>
    <linearGradient id="horizon" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#7c7569" stop-opacity="0"/>
      <stop offset="1" stop-color="#7c7569" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <pattern id="grain" width="140" height="140" patternUnits="userSpaceOnUse">
      <circle cx="28" cy="34" r="1" fill="#5f5a50" opacity="0.06"/>
      <circle cx="92" cy="76" r="1.2" fill="#ffffff" opacity="0.10"/>
      <circle cx="113" cy="31" r="0.8" fill="#6d665b" opacity="0.05"/>
      <path d="M11 118 C43 103 79 111 126 91" fill="none" stroke="#6b655b" stroke-width="0.7" opacity="0.045"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" rx="38" fill="url(#bg)"/>
  <rect width="1200" height="675" rx="38" fill="url(#centerLight)"/>
  <rect width="1200" height="675" rx="38" fill="url(#grain)" opacity="0.55"/>

  <path d="M0 486 C160 462 326 469 512 452 C742 431 951 444 1200 415 L1200 675 L0 675 Z" fill="url(#horizon)"/>
  <path d="M185 168 C340 112 520 101 690 134 C838 162 960 148 1084 104" fill="none" stroke="#7d7568" stroke-width="2" opacity="0.065"/>
  <path d="M207 228 C362 186 531 183 680 206 C840 231 968 212 1085 176" fill="none" stroke="#7d7568" stroke-width="2" opacity="0.055"/>

  <g opacity="0.24" filter="url(#blur)">
    <ellipse cx="604" cy="535" rx="178" ry="29" fill="#514b43"/>
  </g>

  <g transform="translate(600 258)" opacity="0.82">
    <circle cx="0" cy="0" r="35" fill="#82796c"/>
    <path d="M-34 58 C-26 25 26 25 34 58 C43 96 18 134 0 154 C-18 134 -43 96 -34 58 Z" fill="#82796c"/>
    <path d="M-39 132 C-92 158 -134 192 -169 236" fill="none" stroke="#82796c" stroke-width="24" stroke-linecap="round"/>
    <path d="M39 132 C92 158 134 192 169 236" fill="none" stroke="#82796c" stroke-width="24" stroke-linecap="round"/>
    <path d="M-46 96 C-96 103 -137 120 -179 146" fill="none" stroke="#82796c" stroke-width="18" stroke-linecap="round" opacity="0.55"/>
    <path d="M46 96 C96 103 137 120 179 146" fill="none" stroke="#82796c" stroke-width="18" stroke-linecap="round" opacity="0.55"/>
  </g>

  <circle cx="600" cy="314" r="154" fill="none" stroke="#8e8476" stroke-width="2" opacity="0.16"/>
  <circle cx="600" cy="314" r="235" fill="none" stroke="#8e8476" stroke-width="1.5" opacity="0.10"/>
  <circle cx="600" cy="314" r="316" fill="none" stroke="#8e8476" stroke-width="1.2" opacity="0.07"/>

  <path d="M392 571 C482 554 707 554 804 572" fill="none" stroke="#766f64" stroke-width="2" opacity="0.12"/>
  <text x="86" y="562" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#504a42" opacity="0.30">antes do nome, apenas a presença</text>
</svg>

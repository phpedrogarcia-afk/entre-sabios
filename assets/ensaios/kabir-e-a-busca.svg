<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Porta aberta para dentro</title>
  <desc id="desc">Ilustração minimalista de uma porta simples aberta para uma luz interna, sugerindo busca, presença e interioridade.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f5efe4"/>
      <stop offset="0.52" stop-color="#e5dccb"/>
      <stop offset="1" stop-color="#bfb7a8"/>
    </linearGradient>
    <radialGradient id="innerLight" cx="52%" cy="48%" r="48%">
      <stop offset="0" stop-color="#fff4cf" stop-opacity="0.78"/>
      <stop offset="0.52" stop-color="#ead7ad" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#6f655b" stop-opacity="0.04"/>
    </radialGradient>
    <linearGradient id="doorLight" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff1c8" stop-opacity="0.86"/>
      <stop offset="1" stop-color="#b98f5e" stop-opacity="0.42"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <pattern id="grain" width="130" height="130" patternUnits="userSpaceOnUse">
      <circle cx="21" cy="33" r="1" fill="#5f594f" opacity="0.055"/>
      <circle cx="88" cy="76" r="1.1" fill="#ffffff" opacity="0.10"/>
      <circle cx="112" cy="21" r="0.8" fill="#635b51" opacity="0.045"/>
      <path d="M10 112 C43 96 79 104 119 84" fill="none" stroke="#6c6459" stroke-width="0.7" opacity="0.045"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" rx="38" fill="url(#bg)"/>
  <rect width="1200" height="675" rx="38" fill="url(#innerLight)"/>
  <rect width="1200" height="675" rx="38" fill="url(#grain)" opacity="0.55"/>

  <path d="M0 510 C168 482 338 498 520 471 C746 438 970 460 1200 422 L1200 675 L0 675 Z" fill="#70675d" opacity="0.12"/>
  <path d="M142 158 C296 124 450 134 590 169" fill="none" stroke="#746a5e" stroke-width="2" opacity="0.06"/>
  <path d="M664 161 C824 119 982 132 1086 174" fill="none" stroke="#746a5e" stroke-width="2" opacity="0.05"/>

  <g opacity="0.22" filter="url(#soft)">
    <ellipse cx="604" cy="570" rx="205" ry="34" fill="#3e3933"/>
    <path d="M489 199 L711 199 L776 565 C673 588 528 588 424 565 Z" fill="#f0c987" opacity="0.30"/>
  </g>

  <g transform="translate(600 180)">
    <rect x="-110" y="0" width="220" height="360" rx="8" fill="#7f7468" opacity="0.76"/>
    <rect x="-82" y="30" width="164" height="302" rx="5" fill="url(#doorLight)" opacity="0.82"/>
    <path d="M-82 30 L82 30 L48 332 L-82 332 Z" fill="#fff0c4" opacity="0.18"/>
    <path d="M82 30 L151 67 L151 356 L82 332 Z" fill="#685f55" opacity="0.58"/>
    <path d="M82 30 L151 67" stroke="#958879" stroke-width="4" opacity="0.45"/>
    <circle cx="117" cy="203" r="6" fill="#d7c29a" opacity="0.62"/>
    <rect x="-121" y="354" width="255" height="24" rx="12" fill="#7f7468" opacity="0.76"/>
  </g>

  <path d="M438 578 C506 552 697 552 766 578" fill="none" stroke="#efd8a5" stroke-width="3" opacity="0.18"/>
  <path d="M386 612 C486 594 714 594 814 612" fill="none" stroke="#756b60" stroke-width="2" opacity="0.12"/>
  <text x="80" y="562" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#4f4840" opacity="0.30">a porta procurada talvez já esteja aberta</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Figura e sombra em uma parede clara</title>
  <desc id="desc">Ilustração minimalista de uma figura diante de uma parede clara, com uma sombra ampliada ao lado, sugerindo o conceito junguiano de sombra.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f5f0e6"/>
      <stop offset="0.52" stop-color="#ebe3d4"/>
      <stop offset="1" stop-color="#d7d0c0"/>
    </linearGradient>
    <radialGradient id="light" cx="36%" cy="35%" r="72%">
      <stop offset="0" stop-color="#fffaf0" stop-opacity="0.86"/>
      <stop offset="0.62" stop-color="#efe7d8" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#b8ad9c" stop-opacity="0.18"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <pattern id="grain" width="120" height="120" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="22" r="1.1" fill="#5f5b52" opacity="0.08"/>
      <circle cx="78" cy="42" r="0.9" fill="#5f5b52" opacity="0.06"/>
      <circle cx="45" cy="92" r="1" fill="#ffffff" opacity="0.12"/>
      <path d="M8 111C36 97 62 100 96 84" fill="none" stroke="#6a655c" stroke-width="0.7" opacity="0.05"/>
    </pattern>
    <linearGradient id="floor" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#cfc6b5" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#7d7468" stop-opacity="0.20"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" rx="38" fill="url(#bg)"/>
  <rect width="1200" height="675" rx="38" fill="url(#light)"/>
  <rect width="1200" height="675" rx="38" fill="url(#grain)" opacity="0.48"/>

  <path d="M0 501 C225 474 383 493 565 472 C785 447 958 470 1200 438 L1200 675 L0 675 Z" fill="url(#floor)"/>
  <path d="M140 128 C290 86 472 83 645 119" fill="none" stroke="#716a5d" stroke-width="2" opacity="0.08"/>
  <path d="M673 117 C826 89 990 103 1090 152" fill="none" stroke="#716a5d" stroke-width="2" opacity="0.05"/>

  <g opacity="0.40" filter="url(#softShadow)">

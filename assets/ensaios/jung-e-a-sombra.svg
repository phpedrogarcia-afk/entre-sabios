    <path d="M46 333 C37 392 31 448 21 509" stroke="#4f4a43" stroke-width="30" stroke-linecap="round"/>
    <path d="M121 335 C136 394 148 449 164 509" stroke="#4f4a43" stroke-width="30" stroke-linecap="round"/>
  </g>

  <g transform="translate(469 225)">

  <path d="M408 591 C505 575 598 577 718 592" fill="none" stroke="#726a5f" stroke-width="2" opacity="0.12"/>
  <text x="80" y="560" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#504a42" opacity="0.32">a sombra não desaparece quando recebe outro nome</text>

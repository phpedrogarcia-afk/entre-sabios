    <path d="M31 232 C24 285 19 336 12 391" stroke="#8b8173" stroke-width="19" stroke-linecap="round" opacity="0.82"/>
    <path d="M77 232 C88 287 98 338 110 391" stroke="#8b8173" stroke-width="19" stroke-linecap="round" opacity="0.82"/>
    <path d="M13 129 C-24 163 -50 196 -70 232" stroke="#8b8173" stroke-width="16" stroke-linecap="round" opacity="0.58"/>
    <path d="M98 128 C136 162 162 195 184 229" stroke="#8b8173" stroke-width="16" stroke-linecap="round" opacity="0.58"/>

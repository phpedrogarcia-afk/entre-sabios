<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Duas árvores com espaço entre si</title>
  <desc id="desc">Ilustração minimalista de duas árvores próximas, porém separadas por espaço e luz, sugerindo amor, distância e liberdade.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f5efe4"/>
      <stop offset="0.52" stop-color="#e8dfce"/>
      <stop offset="1" stop-color="#c9c1b2"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="36%" r="64%">
      <stop offset="0" stop-color="#fff7e7" stop-opacity="0.88"/>
      <stop offset="0.58" stop-color="#eadac4" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#927f70" stop-opacity="0.08"/>
    </radialGradient>
    <linearGradient id="ground" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#8a7e70" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#70675d" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <pattern id="grain" width="130" height="130" patternUnits="userSpaceOnUse">
      <circle cx="22" cy="34" r="1" fill="#625b51" opacity="0.055"/>
      <circle cx="91" cy="78" r="1.1" fill="#ffffff" opacity="0.10"/>
      <circle cx="112" cy="21" r="0.8" fill="#675b52" opacity="0.045"/>
      <path d="M10 112 C43 96 79 104 119 84" fill="none" stroke="#705f58" stroke-width="0.7" opacity="0.045"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" rx="38" fill="url(#bg)"/>
  <rect width="1200" height="675" rx="38" fill="url(#glow)"/>
  <rect width="1200" height="675" rx="38" fill="url(#grain)" opacity="0.55"/>

